<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <!-- White background -->
  <rect width="160" height="80" fill="white" rx="10"/>

  <!-- Clover/lotus icon -->
  <g transform="translate(16, 40)" fill="#6B8E6B">
    <!-- Simple 4-petal flower -->
    <ellipse cx="0" cy="-8" rx="5" ry="8" opacity="0.85"/>
    <ellipse cx="0" cy="8" rx="5" ry="8" opacity="0.85"/>
    <ellipse cx="-8" cy="0" rx="8" ry="5" opacity="0.85"/>
    <ellipse cx="8" cy="0" rx="8" ry="5" opacity="0.85"/>
    <circle cx="0" cy="0" r="4" fill="#4A6741"/>
    <!-- Stem -->
    <line x1="0" y1="12" x2="0" y2="20" stroke="#6B8E6B" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- "Mây" text -->
  <text x="34" y="32"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#3D5A3A"
    letter-spacing="1">Mây</text>

  <!-- "Yoga" text -->
  <text x="34" y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    fill="#6B8E6B"
    letter-spacing="2">Yoga</text>
</svg>
