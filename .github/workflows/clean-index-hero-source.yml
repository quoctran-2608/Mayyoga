name: Clean index hero source

on:
  push:
    paths:
      - '.github/trigger-index-hero-cleanup'

permissions:
  contents: write

jobs:
  clean-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch index hero source safely
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          legacy = '''        <div class="hero-stats">
          <div class="hero-stat">
            <div class="number">90+</div>
            <div class="label">Tư thế Yoga</div>
          </div>
          <div class="hero-stat">
            <div class="number">10K+</div>
            <div class="label">Người đọc</div>
          </div>
          <div class="hero-stat">
            <div class="number">30+</div>
            <div class="label">Bài viết</div>
          </div>
        </div>
'''

          principles = '''        <div class="hero-principles" aria-label="Ba nguyên tắc nền tảng của Mây Yoga">
          <div class="hero-principle">
            <span class="hero-principle-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="5" r="2"></circle>
                <path d="M12 7v6"></path>
                <path d="M8.5 10.5 12 8l3.5 2.5"></path>
                <path d="m9 21 3-8 3 8"></path>
                <path d="M8 16h8"></path>
              </svg>
            </span>
            <div class="hero-principle-copy">
              <div class="hero-principle-title">Tư thế đúng</div>
              <div class="hero-principle-subtitle">Căn chỉnh an toàn</div>
            </div>
          </div>
          <div class="hero-principle">
            <span class="hero-principle-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 8 9-5 9 5-9 5-9-5Z"></path>
                <path d="M7 10.2V15c0 1.7 2.2 3 5 3s5-1.3 5-3v-4.8"></path>
                <path d="M21 8v6"></path>
              </svg>
            </span>
            <div class="hero-principle-copy">
              <div class="hero-principle-title">Hơi thở đúng</div>
              <div class="hero-principle-subtitle">Thực hành có nền tảng</div>
            </div>
          </div>
          <div class="hero-principle">
            <span class="hero-principle-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="m12 2.8 2.78 5.63 6.22.9-4.5 4.39 1.06 6.2L12 17l-5.56 2.92 1.06-6.2L3 9.33l6.22-.9L12 2.8Z"></path>
              </svg>
            </span>
            <div class="hero-principle-copy">
              <div class="hero-principle-title">Hiểu cơ thể</div>
              <div class="hero-principle-subtitle">An toàn &amp; bền vững</div>
            </div>
          </div>
        </div>
'''

          image_line = '        <img loading="eager" src="assets/images/hero-visual.webp" alt="Mây Yoga - Hatha Yoga">\n'

          if legacy not in text:
              raise SystemExit('Legacy hero stats block not found; refusing unsafe patch')
          text = text.replace(legacy, '', 1)

          if 'class="hero-principles"' not in text:
              if image_line not in text:
                  raise SystemExit('Hero image anchor not found; refusing unsafe patch')
              text = text.replace(image_line, image_line + principles, 1)

          path.write_text(text, encoding='utf-8')

      - name: Remove temporary trigger and workflow
        run: |
          rm -f .github/trigger-index-hero-cleanup
          rm -f .github/workflows/clean-index-hero-source.yml

      - name: Commit cleaned source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix(index): clean legacy hero stats from source [skip ci]"
          git push
