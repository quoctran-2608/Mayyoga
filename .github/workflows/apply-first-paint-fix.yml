name: Apply homepage first-paint fix

on:
  push:
    paths:
      - '.github/workflows/apply-first-paint-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch homepage loading order
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')

          old_head_link = '  <link rel="stylesheet" href="css/style.css?v=6">'
          new_head_links = '''  <link rel="stylesheet" href="css/style.css?v=6">
  <!-- Homepage critical CSS: load before first paint to prevent legacy-layout flash on cold/incognito visits. -->
  <link rel="stylesheet" href="css/index-responsive.css?v=20260721a" data-index-responsive="true">
  <link rel="stylesheet" href="css/index-hero-principles.css?v=20260721a" data-index-hero-principles="true">
  <link rel="stylesheet" href="css/index-hero-principle-icons-v2.css?v=20260721a">
  <link rel="stylesheet" href="css/hero-redesign-v2.css?v=20260720n" data-home-hero-redesign="true">
  <link rel="stylesheet" href="css/hero-fix-v4.css?v=20260719f" data-home-hero-fix="true">
  <link rel="stylesheet" href="css/index-hero-final-static.css?v=20260721a" data-home-hero-final-refinement="true">
  <link rel="stylesheet" href="css/index-mobile-hero-v2.css?v=20260721a" data-home-mobile-hero-v2="true" media="(max-width: 768px)">
  <link rel="stylesheet" href="css/index-mobile-polish-v3.css?v=20260721f" data-home-mobile-polish-v3="true" media="(max-width: 768px)">
  <link rel="stylesheet" href="css/index-mobile-fixes-v4.css?v=20260721a" data-home-mobile-fixes-v4="true" media="(max-width: 768px)">
  <link rel="stylesheet" href="css/index-mobile-refine-v5.css?v=20260721a" data-home-mobile-refine-v5="true" media="(max-width: 768px)">
  <link rel="preload" as="image" href="assets/images/hero_visual_mobile.webp?v=20260721a" media="(max-width: 768px)" fetchpriority="high">
  <link rel="preload" as="image" href="assets/images/hero-visual.webp?v=20260719f" media="(min-width: 769px)" fetchpriority="high">
  <script defer src="js/home-hero-visual.js?v=20260721b" data-home-hero-visual="true"></script>'''

          if 'data-home-hero-final-refinement="true"' not in text:
              if old_head_link not in text:
                  raise SystemExit('Could not locate main stylesheet link in index.html')
              text = text.replace(old_head_link, new_head_links, 1)

          text = text.replace('<body>', '<body class="home-hero-redesign">', 1)

          principles = '''
        <div class="hero-principles" aria-label="Ba nguyên tắc nền tảng của Mây Yoga">
          <div class="hero-principle">
            <span class="hero-principle-icon" aria-hidden="true"><img src="assets/images/icons/tu_the_chuan_icon.webp" alt="" width="50" height="50"></span>
            <div class="hero-principle-copy">
              <div class="hero-principle-title">Tư thế chuẩn</div>
              <div class="hero-principle-subtitle">Căn chỉnh an toàn</div>
            </div>
          </div>
          <div class="hero-principle">
            <span class="hero-principle-icon" aria-hidden="true"><img src="assets/images/icons/hoi_tho_dung_icon.webp" alt="" width="50" height="50"></span>
            <div class="hero-principle-copy">
              <div class="hero-principle-title">Hơi thở đúng</div>
              <div class="hero-principle-subtitle">Thực hành có nền tảng</div>
            </div>
          </div>
          <div class="hero-principle">
            <span class="hero-principle-icon" aria-hidden="true"><img src="assets/images/icons/hieu_co_the_icon.webp" alt="" width="50" height="50"></span>
            <div class="hero-principle-copy">
              <div class="hero-principle-title">Hiểu cơ thể</div>
              <div class="hero-principle-subtitle">An toàn &amp; bền vững</div>
            </div>
          </div>
        </div>'''

          if 'class="hero-principles"' not in text:
              trust_end = '''        <div class="floating-card card-2 hero-trust-card" aria-label="Học đúng từ nền tảng: Tư thế, Hơi thở, Hiểu cơ thể">
          <div class="card-icon hero-trust-icon" aria-hidden="true">✓</div>
          <div class="card-text">
            <div class="card-title">Học đúng từ nền tảng</div>
            <div class="card-sub">Tư thế • Hơi thở • Hiểu cơ thể</div>
          </div>
        </div>'''
              if trust_end not in text:
                  raise SystemExit('Could not locate Hero trust card in index.html')
              text = text.replace(trust_end, trust_end + principles, 1)

          index.write_text(text, encoding='utf-8')

          helper = Path('js/home-hero-visual.js')
          js = helper.read_text(encoding='utf-8')
          js = js.replace(
              "document.querySelector('style[data-home-hero-final-refinement]')",
              "document.querySelector('[data-home-hero-final-refinement]')"
          )
          helper.write_text(js, encoding='utf-8')
          PY

      - name: Commit source-level first-paint fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html js/home-hero-visual.js
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "fix(index): eliminate mobile legacy-layout flash on first paint"
          git push
